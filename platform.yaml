data_plane:
  dataset: motionlabs/fineweb-ultra-mini
  max_records: 1000000   # effectively uncapped — use the full streaming dataset
  tokenizer_cache: artifacts/tokenizer/tokenizer.json
  vocab_size: 8000
  batch_size: 16
  seq_len: 128

training:
  base_preset: xl
  num_phases: 4
  steps_per_phase: 8000      # 32k total steps
  learning_rate: 3.0e-4
  shard_fraction: 0.10
  seed: 42
  # Optimizations (the real ones — these matter)
  gradient_checkpointing: true
  mixed_precision: fp32      # fp16 unreliable on MPS torch 2.2; auto-falls back
  cpu_offload_frozen: false
  disable_shard_mask: true   # 10% mask was crippling convergence
  end_to_end: true           # joint backprop instead of phased freeze

personalization:
  principles_file: principles.yaml
  lora_rank: 8
  lora_alpha: 16.0
  epochs: 1
  learning_rate: 1.0e-4
  merge_at_packaging: true

hardware:
  prefer_quant: auto
  allow_partial_fallback: true

serving:
  host: 127.0.0.1
  port: 8080

registry:
  root: artifacts/registry
