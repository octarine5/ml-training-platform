global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    service: "ml-training-platform"

scrape_configs:
  - job_name: "ml-training-platform"
    metrics_path: /metrics
    static_configs:
      - targets: ["service:8000"]  # docker-compose service name
        labels:
          env: local

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

